<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="做菜收藏">
<title>做菜收藏夹</title>
<style>
:root {
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --text: #1D1D1F;
  --text-secondary: #86868B;
  --text-tertiary: #AEAEB2;
  --border: rgba(0,0,0,0.08);
  --brand: #FE2C55;
  --brand-light: #FFF0F3;
  --tag-bg: #F2F2F7;
  --tag-text: #636366;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-full: 999px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans CJK SC", "WenQuanYi Micro Hei", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0D0D0D;
    --surface: #1C1C1E;
    --text: #F5F5F7;
    --text-secondary: #98989D;
    --text-tertiary: #636366;
    --border: rgba(255,255,255,0.08);
    --brand: #FE2C55;
    --brand-light: #2C0F16;
    --tag-bg: #2C2C2E;
    --tag-text: #98989D;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 16px 16px 12px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.header-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.header-title span { color: var(--brand); }

/* ── Search ── */
.search-wrap {
  position: relative;
}

.search-input {
  width: 100%;
  height: 44px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--surface);
  padding: 0 16px 0 38px;
  font-size: 16px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}

.search-input:focus {
  box-shadow: 0 0 0 3px rgba(254,44,85,0.15), var(--shadow-sm);
}

.search-input::placeholder { color: var(--text-tertiary); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  pointer-events: none;
}

.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  border: none;
  background: var(--tag-bg);
  border-radius: 50%;
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.search-clear.visible { display: flex; }

/* ── Stats bar ── */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px 4px;
  font-size: 13px;
  color: var(--text-secondary);
}

.stats-bar .count { font-weight: 600; color: var(--text); }

/* ── Video List ── */
.video-list {
  padding: 0 16px 100px;
}

.video-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.video-card:active {
  transform: scale(0.985);
  box-shadow: var(--shadow-md);
}

.video-info {
  min-width: 0;
}

.video-title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-all;
}

.video-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}

.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  background: var(--tag-bg);
  color: var(--tag-text);
  white-space: nowrap;
}

.tag.highlight {
  background: var(--brand-light);
  color: var(--brand);
}

/* ── Empty / Loading / Error ── */
.state-message {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.state-message .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }

.state-message .title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.state-message .desc { font-size: 14px; line-height: 1.6; }

/* ── Skeleton ── */
.skeleton-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}

.skeleton-line {
  height: 14px;
  border-radius: 4px;
  background: var(--tag-bg);
  margin-bottom: 10px;
  animation: shimmer 1.5s infinite;
}

.skeleton-line:first-child { width: 70%; }
.skeleton-line:nth-child(2) { width: 50%; }
.skeleton-line:last-child { width: 30%; margin-bottom: 0; }

@keyframes shimmer {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 24px 16px;
  font-size: 12px;
  color: var(--text-tertiary);
}

.footer a {
  color: var(--brand);
  text-decoration: none;
  font-weight: 500;
}

.footer a:active { opacity: 0.7; }

/* ── Responsive ── */
@media (min-width: 600px) {
  body {
    max-width: 480px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title">🍳 我的<span>做菜</span>收藏</div>
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索菜名、食材、标签..." autocomplete="off">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <span><span class="count" id="videoCount">-</span> 个视频</span>
  <span id="filterHint"></span>
</div>

<!-- Video List -->
<div class="video-list" id="videoList">
  <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
  <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
  <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
</div>

<!-- Footer -->
<div class="footer">
  📝 在 GitHub 上编辑 data.json 即可更新内容
</div>

<script>
(function() {
  const DATA_URL = 'data.json';

  let videos = [];
  let searchQuery = '';

  const $ = (sel) => document.querySelector(sel);
  const searchInput = $('#searchInput');
  const searchClear = $('#searchClear');
  const videoList = $('#videoList');
  const videoCount = $('#videoCount');
  const filterHint = $('#filterHint');

  // ── Load data from JSON ──
  async function loadVideos() {
    try {
      const resp = await fetch(DATA_URL, { cache: 'no-cache' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (!Array.isArray(data)) throw new Error('数据格式错误：应为数组');
      videos = data;
      render();
    } catch (err) {
      videoList.innerHTML = `
        <div class="state-message">
          <div class="icon">⚠️</div>
          <div class="title">加载失败</div>
          <div class="desc">无法读取 data.json，请检查文件是否存在且格式正确</div>
        </div>`;
      console.error('加载数据失败:', err);
      videoCount.textContent = '0';
    }
  }

  // ── Render ──
  function renderTags(tags, searchTerms) {
    if (!tags || tags.length === 0) return '';
    return tags.map(t => {
      const isMatch = searchTerms && searchTerms.some(s => t.toLowerCase().includes(s));
      return `<span class="tag${isMatch ? ' highlight' : ''}">${escapeHtml(t)}</span>`;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function render() {
    const q = searchQuery.trim().toLowerCase();
    const searchTerms = q ? q.split(/\s+/).filter(Boolean) : [];

    let filtered = videos;
    if (searchTerms.length > 0) {
      filtered = videos.filter(v => {
        const haystack = [v.title, ...(v.tags || [])].join(' ').toLowerCase();
        return searchTerms.every(t => haystack.includes(t));
      });
    }

    videoCount.textContent = videos.length;

    if (searchTerms.length > 0) {
      filterHint.textContent = `找到 ${filtered.length} 个`;
    } else {
      filterHint.textContent = '';
    }

    videoList.querySelectorAll('.video-card, .skeleton-card, .state-message').forEach(c => c.remove());

    if (videos.length === 0) {
      videoList.innerHTML = `
        <div class="state-message">
          <div class="icon">📋</div>
          <div class="title">还没有收藏视频</div>
          <div class="desc">编辑 HTML 文件中的 EMBEDDED_DATA 数据块添加视频</div>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      videoList.innerHTML = `
        <div class="state-message">
          <div class="icon">🔍</div>
          <div class="title">没有匹配的视频</div>
          <div class="desc">试试其他关键词</div>
        </div>`;
      return;
    }

    const fragment = document.createDocumentFragment();

    filtered.forEach(v => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
        <div class="video-info">
          <div class="video-title">${escapeHtml(v.title || '未命名视频')}</div>
          <div class="video-tags">${renderTags(v.tags, searchTerms)}</div>
        </div>`;

      card.addEventListener('click', () => openDouyin(v.url));
      fragment.appendChild(card);
    });

    videoList.appendChild(fragment);
  }

  function openDouyin(url) {
    if (!url) return;
    window.open(url, '_blank');
  }

  // ── Events ──
  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    searchClear.classList.toggle('visible', searchQuery.length > 0);
    render();
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchClear.classList.remove('visible');
    render();
    searchInput.focus();
  });

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
    }
  });

  // ── Init ──
  loadVideos();

  if (window.innerWidth > 600) {
    setTimeout(() => searchInput.focus(), 100);
  }
})();
</script>
</body>
</html>
